site_name: ramda-doc
site_author: Zayn Ramdass
theme: shadcn
repo_url: https://github.com/zaynram/ramda-doc
repo_name: ''
strict: true
extra:
  version: 1.0
nav:
  - Home: index.md
  - Issues:
      - '#1': issues/polyglot-reference-autodoc-tooling.issue.md
  - Decisions:
      - '0000': decisions/0000-use-markdown-architectural-decision-records.md
      - '0001': decisions/0001-use-properdocs-static-site-generator.md
      - '0002': decisions/0002-language-agnostic-reference-generation.draft.md
draft_docs: |
  _runbook/
  *.draft.md
exclude_docs: |
  requirements.txt
  internal/
  *.toml
not_in_nav: |
  schema/
  *.schema.json
validation:
  omitted_files: warn
  absolute_links: relative_to_docs
  unrecognized_links: warn
  anchors: warn
markdown_extensions:
  - smarty
  - sane_lists
  - admonition
  - footnotes
  - fenced_code
  - shadcn.extensions.echarts.alpha
  - shadcn.extensions.iconify
  - shadcn.extensions.codexec
  - codehilite:
      linenums: true
      use_pygments: true
  - toc:
      permalink: true
plugins:
  - search
  - excalidraw
  - d2
