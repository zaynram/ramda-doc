name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  strict-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install -r docs/requirements.txt
      - run: properdocs build --strict
